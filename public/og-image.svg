<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <!-- Blue accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="1050" cy="120" r="200" fill="#2563eb" opacity="0.08" filter="url(#glow)"/>
  <circle cx="150" cy="520" r="180" fill="#7c3aed" opacity="0.08" filter="url(#glow)"/>
  <circle cx="600" cy="315" r="300" fill="#1e40af" opacity="0.04" filter="url(#glow)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Gradient accent bar -->
  <rect x="80" y="170" width="6" height="80" rx="3" fill="url(#accent)"/>

  <!-- Name -->
  <text x="110" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">
    Yemi Genderson
  </text>

  <!-- Role badge -->
  <rect x="110" y="248" width="340" height="44" rx="22" fill="#2563eb" opacity="0.2"/>
  <rect x="110" y="248" width="340" height="44" rx="22" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  <text x="280" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#93c5fd" text-anchor="middle">
    ⚡ Full Stack Developer
  </text>

  <!-- Description -->
  <text x="110" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8">
    React · TypeScript · Java · Spring Boot · Quarkus
  </text>
  <text x="110" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">
    Arquitecturas distribuidas · Proyectos bancarios · Lima, Perú
  </text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="110" y="420" width="160" height="80" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="190" y="453" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">5+</text>
  <text x="190" y="480" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Años de exp.</text>

  <!-- Stat 2 -->
  <rect x="290" y="420" width="160" height="80" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="370" y="453" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">16+</text>
  <text x="370" y="480" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Tecnologías</text>

  <!-- Stat 3 -->
  <rect x="470" y="420" width="160" height="80" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="453" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">10+</text>
  <text x="550" y="480" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Proyectos</text>

  <!-- Right side: URL -->
  <text x="1120" y="315" font-family="system-ui, sans-serif" font-size="16" fill="#475569" text-anchor="end">
    yegecali.github.io/portfolio
  </text>

  <!-- Gradient underline for name -->
  <rect x="110" y="235" width="620" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
